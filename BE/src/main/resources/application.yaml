spring:
  application:
    name: SHMS-Hackathon-BE

  # ─── SQL Server datasource ──────────────────────────────────────────────────
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=SHMS_Hackathon;encrypt=false;trustServerCertificate=true;sendStringParametersAsUnicode=true
    username: sa
    password: '12345'
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  # ─── JPA / Hibernate / Flyway────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.SQLServerDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # ─── Mail (Brevo SMTP Configuration) ────────
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username:
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  mail:
    sender: sealhackathon26@gmail.com

# ─── Server ─────────────────────────────────────────────────────────────────
server:
  port: 8080

# ─── Swagger / OpenAPI ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
