spring:
  application:
    name: SHMS-Hackathon-BE

  # ─── SQL Server datasource ──────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=SHMS_Hackathon;encrypt=false;trustServerCertificate=true;sendStringParametersAsUnicode=true}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:12345}
    driver-class-name: ${DB_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}

  # ─── JPA / Hibernate / Flyway────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: ${DB_DIALECT:org.hibernate.dialect.SQLServerDialect}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # ─── Mail (Brevo SMTP Configuration) ────────
  mail:
    host: smtp-relay.brevo.com
    port: 2525
    username: ${BREVO_USERNAME:local_username_here}
    password: ${BREVO_PASSWORD:local_password_here}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  mail:
    sender: sealhackathon26@gmail.com

# ─── Server ─────────────────────────────────────────────────────────────────
server:
  port: 8080

# ─── Swagger / OpenAPI ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
